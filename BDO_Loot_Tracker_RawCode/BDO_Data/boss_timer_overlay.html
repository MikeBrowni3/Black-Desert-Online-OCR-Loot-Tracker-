<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BDO Boss Timer Overlay - Sharp Georama</title>

    <style>

        @font-face {
            font-family: 'Georama';
            src: local('Georama'), local('Georama-Bold');
            font-weight: 700;
        }

        :root { 
            --panel-bg: rgba(0, 0, 0, 0.9); 
            --text-main: #ffffff; 
            --accent-green: #00ff88;
            --info-blue: #3498db;
        }

        body { 
            background-color: transparent; 
            margin: 0; 
            padding: 10px; 
            font-family: 'Georama', sans-serif; 
            color: var(--text-main);
        }
        
        #boss-container { 
            display: none; 
            width: 320px; 
            background: var(--panel-bg); 
            border-radius: 4px; 
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,1);
        }
        
        .header { 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .boss-label {
            color: var(--info-blue);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .boss-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .boss-icon {
            height: 50px;
            width: 50px;
            border-radius: 4px;
        }

        .boss-details {
            flex: 1;
        }

        .boss-name {
            color: var(--accent-green);
            font-size: 20px;
            font-weight: bold;
        }

        .countdown {
            color: var(--text-main);
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .region {
            color: #bdc3c7;
            font-size: 12px;
            margin-top: 5px;
        }

        .loading {
            color: #bdc3c7;
            font-size: 16px;
        }

    </style>

</head>

<body>

    <div id="sound-enable-container" style="display: block; margin-bottom: 10px;">
        <button id="enable-sound-btn" onclick="enableSound()" style="background: #3498db; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: 'Georama', sans-serif; font-size: 12px;">Enable Sound Notifications</button>
    </div>

    <div id="boss-container">
        <div class="header">
            <div class="boss-label">Next Boss Spawn</div>
        </div>
        <div class="boss-info">
            <img id="boss-icon" class="boss-icon" style="display: none;">
            <div class="boss-details">
                <div id="boss-name" class="boss-name">Loading...</div>
                <div id="countdown" class="countdown">--:--:--</div>
                <div id="region" class="region"></div>
            </div>
        </div>
    </div>

    <script>

        let playedSounds = new Set();
        let lastCountdown = null;
        let soundEnabled = false;
        let spawnTimestamp = null;
        let currentBoss = null;
        let currentRegion = null;

        function enableSound() {
            soundEnabled = true;
            document.getElementById('sound-enable-container').style.display = 'none';
            // Test audio by playing a short silent sound to unlock audio context
            const testAudio = new Audio('./sounds/boss_timer/1.mp3');
            testAudio.volume = 0;
            testAudio.play().then(() => {
                testAudio.pause();
                console.log('Audio enabled');
            }).catch(e => console.log('Audio enable failed:', e));
        }

        function formatCountdown(seconds) {
            if (seconds <= 0) return "SPAWNED";
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            if (hours > 0) {
                return `${hours}h ${minutes}m ${secs}s`;
            } else {
                return `${minutes}m ${secs}s`;
            }
        }

        function playSound(soundFile) {
            if (!soundEnabled) return;
            if (playedSounds.has(soundFile)) return;

            const audio = new Audio('./sounds/boss_timer/' + soundFile);
            audio.play().catch(e => console.log('Audio play failed:', e));
            playedSounds.add(soundFile);
        }

        function updateLocalCountdown() {
            if (!spawnTimestamp) return;

            const now = new Date();
            const spawnTime = new Date(spawnTimestamp);
            const diffSeconds = (spawnTime - now) / 1000;

            const countdownEl = document.getElementById('countdown');
            if (countdownEl) {
                countdownEl.innerText = formatCountdown(diffSeconds);
            }

            // Sound notifications based on countdown
            const currentSeconds = Math.floor(diffSeconds);
            if (currentSeconds >= 0) {
                // Reset played sounds if countdown increased (new boss)
                if (lastCountdown !== null && currentSeconds > lastCountdown + 60) {
                    playedSounds.clear();
                }
                
                // Play sounds at specific intervals
                if (currentSeconds <= 1 && currentSeconds >= 0) {
                    playSound('spawn.mp3');
                } else if (currentSeconds <= 60 && currentSeconds >= 59) {
                    playSound('1.mp3');
                } else if (currentSeconds <= 180 && currentSeconds >= 179) {
                    playSound('3.mp3');
                } else if (currentSeconds <= 300 && currentSeconds >= 299) {
                    playSound('5.mp3');
                } else if (currentSeconds <= 600 && currentSeconds >= 599) {
                    playSound('10.mp3');
                } else if (currentSeconds <= 900 && currentSeconds >= 899) {
                    playSound('15.mp3');
                } else if (currentSeconds <= 1800 && currentSeconds >= 1799) {
                    playSound('30.mp3');
                }
                
                lastCountdown = currentSeconds;
            }
        }

        async function syncBossTimer() {
            try {
                const response = await fetch(
                    './bosstimer.json?t=' + Date.now(),
                    {
                        cache: "no-store",
                        headers: {
                            'Cache-Control': 'no-cache'
                        }
                    }
                );
                
                if (!response.ok) return;

                const data = await response.json();

                const container = document.getElementById('boss-container');
                container.style.display = 'block';

                // Update boss info if changed
                if (data.next_boss && data.next_boss !== currentBoss) {
                    currentBoss = data.next_boss;
                    document.getElementById('boss-name').innerText = currentBoss;
                    playedSounds.clear(); // Reset sounds for new boss
                }
                
                if (data.region && data.region !== currentRegion) {
                    currentRegion = data.region;
                    document.getElementById('region').innerText = currentRegion;
                }

                // Update spawn timestamp if available (new format)
                if (data.spawn_timestamp) {
                    spawnTimestamp = data.spawn_timestamp;
                } else if (data.seconds_remaining !== undefined) {
                    // Fallback: calculate spawn timestamp from seconds_remaining (old format)
                    const now = new Date();
                    const spawnTime = new Date(now.getTime() + (data.seconds_remaining * 1000));
                    // Format as local time string (YYYY-MM-DD HH:MM:SS)
                    const year = spawnTime.getFullYear();
                    const month = String(spawnTime.getMonth() + 1).padStart(2, '0');
                    const day = String(spawnTime.getDate()).padStart(2, '0');
                    const hours = String(spawnTime.getHours()).padStart(2, '0');
                    const minutes = String(spawnTime.getMinutes()).padStart(2, '0');
                    const seconds = String(spawnTime.getSeconds()).padStart(2, '0');
                    spawnTimestamp = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                }

                // Boss icon mapping
                const bossIcons = {
                    "Kzarka": "https://assets.garmoth.com/boss/large/kzarka.webp",
                    "Karanda": "https://assets.garmoth.com/boss/large/karanda.webp",
                    "Nouver": "https://assets.garmoth.com/boss/large/nouver.webp",
                    "Kutum": "https://assets.garmoth.com/boss/large/kutum.webp",
                    "Offin": "https://assets.garmoth.com/boss/large/offin.webp",
                    "Vell": "https://assets.garmoth.com/boss/large/vell.webp",
                    "Garmoth": "https://assets.garmoth.com/boss/large/garmoth.webp",
                    "Quint": "https://assets.garmoth.com/boss/large/quint.webp",
                    "Muraka": "https://assets.garmoth.com/boss/large/muraka.webp",
                    "Golden Pig King": "https://assets.garmoth.com/boss/large/pigking.webp",
                    "Uturi": "https://assets.garmoth.com/boss/large/uturi.webp",
                    "Sangoon": "https://assets.garmoth.com/boss/large/sangoon.webp",
                    "Bulgasal": "https://assets.garmoth.com/boss/large/bulgasal.webp",
                    "Black Shadow": "https://assets.garmoth.com/boss/large/blackshadow.webp"
                };

                const bossIcon = document.getElementById('boss-icon');
                const iconUrl = bossIcons[currentBoss];
                if (iconUrl) {
                    bossIcon.src = iconUrl;
                    bossIcon.style.display = 'inline';
                } else {
                    bossIcon.style.display = 'none';
                }

            } catch (e) {
                console.log("Waiting for boss timer data...");
            }
        }

        // Update countdown locally every second
        setInterval(updateLocalCountdown, 1000);
        
        // Sync with tracker.py every 30 seconds
        setInterval(syncBossTimer, 30000);
        
        // Initial sync
        syncBossTimer();
        updateLocalCountdown();

    </script>

</body>
</html>
