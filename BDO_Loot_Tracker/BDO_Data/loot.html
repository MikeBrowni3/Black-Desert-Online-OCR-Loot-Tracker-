<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BDO Loot Overlay - Sharp Georama</title>

    <style>

        @font-face {
            font-family: 'Georama';
            src: local('Georama'), local('Georama-Bold');
            font-weight: 700;
        }

        :root { 
            --panel-bg: rgba(0, 0, 0, 0.9); 
            --text-main: #ffffff; 
            --accent-green: #00ff88;
            --info-blue: #3498db;
        }

        body { 
            background-color: transparent; 
            margin: 0; 
            padding: 10px; 
            font-family: 'Georama', sans-serif; 
            color: var(--text-main);
        }
        
        #tracker-container { 
            display: none; 
            width: 320px; 
            background: var(--panel-bg); 
            border-radius: 4px; 
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,1);
        }
        
        .header { 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .location {
            color: var(--info-blue);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;

            display: flex;
            align-items: center;
            gap: 8px;
        }

        #class-label {
            color: var(--info-blue);
        }

        .timer {
            font-size: 28px;
            margin: 0;
            color: var(--text-main);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--accent-green);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .timer-group {
            display: flex;
            flex-direction: column;
        }
        
        .silver-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .silver-display .value {
            font-size: 22px;
            font-weight: bold;
        }

        .silver-display .label {
            font-size: 10px;
            color: var(--accent-green);
            text-transform: uppercase;
        }

        .loot-list {
            max-height: 400px;
            overflow: hidden;
        }

        .loot-item { 
            display: flex; 
            align-items: center;
            justify-content: space-between; 
            padding: 4px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        .item-icon {
            height: 24px;
            width: 24px;
            margin-right: 8px;
            border-radius: 2px;
        }

        .item-info {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .item-name {
            color: #bdc3c7;
        }

        .item-count {
            color: var(--accent-green);
            font-weight: bold;
        }

        .class-icon {
            height: 50px;
            width: 50px;
            margin-left: 8px;
        }

    </style>

</head>

<body>

    <div id="tracker-container">

        <div class="header">

            <div class="location">
                <span id="location-label">SEARCHING...</span>
                <span id="class-label"></span>
                <img id="class-icon" class="class-icon" style="display: none;">
            </div>

            <div class="header-row">

                <div class="timer-group">
                    <div id="session-timer" class="timer">00:00:00</div>
                </div>

                <div class="silver-display">
                    <div class="label">Total Silver</div>
                    <div id="total-silver-display" class="value">0</div>
                </div>

            </div>

        </div>

        <div class="stats-grid">

            <div class="stat-box">
                <div class="stat-label">Silver / Hr</div>
                <div id="silver-hr" class="stat-value">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-label">Trash / Hr</div>
                <div id="trash-hr" class="stat-value">0</div>
            </div>

        </div>

        <div id="loot-list" class="loot-list"></div>

    </div>

    <script>

        async function refreshData() {

            try {

                const response = await fetch(
                    './bdo-loot-data.json?t=' + Date.now(),
                    {
                        cache: "no-store",
                        headers: {
                            'Cache-Control': 'no-cache'
                        }
                    }
                );
                
                if (!response.ok) return;

                const data = await response.json();

                const container = document.getElementById('tracker-container');
                
                if (data.session_active === true) {

                    container.style.display = 'block';

                } else {

                    container.style.display = 'none';
                    return;
                }

                document.getElementById('location-label').innerText =
                    data.location || "SEARCHING...";

                document.getElementById('class-label').innerText =
                    data.class ? `• ${data.class}` : "";

                const classIcon = document.getElementById('class-icon');
                if (data.class_icon) {
                    classIcon.src = data.class_icon;
                    classIcon.style.display = 'inline';
                } else {
                    classIcon.style.display = 'none';
                }

                document.getElementById('session-timer').innerText =
                    data.session_duration || "00:00:00";

                document.getElementById('total-silver-display').innerText =
                    Number(data.total_silver || 0).toLocaleString();

                document.getElementById('silver-hr').innerText =
                    Number(data.silver_per_hr || 0).toLocaleString();

                document.getElementById('trash-hr').innerText =
                    Number(data.trash_per_hr || 0).toLocaleString();

                const list = document.getElementById('loot-list');

                const items = data.items || {};

                const sortedItems = Object.entries(items).sort(
                    (a, b) => b[1].count - a[1].count
                );

                list.innerHTML = sortedItems
                    .map(([name, info]) => `
                        <div class="loot-item">
                            <div class="item-info">
                                ${info.icon ? `<img src="${info.icon}" class="item-icon">` : ''}
                                <span class="item-name">${name}</span>
                            </div>
                            <span class="item-count">
                                x${Number(info.count).toLocaleString()}
                            </span>
                        </div>
                    `).join('');

            } catch (e) {

                console.log("Waiting for data...");
            }
        }

        setInterval(refreshData, 1000);

        refreshData();

    </script>

</body>
</html>
